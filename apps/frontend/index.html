<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leidy Cleaner Services</title>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Google tag (gtag.js) - somente site público -->
    <script>
      const isPublicWebsite =
        window.location.hostname === 'cleanerleidy.com.br' ||
        window.location.hostname === 'www.cleanerleidy.com.br';

      if (isPublicWebsite) {
        const gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-1MT0YP73VL';
        document.head.appendChild(gtagScript);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;

        gtag('js', new Date());
        gtag('config', 'G-1MT0YP73VL');
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
