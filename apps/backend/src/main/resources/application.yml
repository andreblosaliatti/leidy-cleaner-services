server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: leidy-cleaner-services
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/leidy_cleaner}
    username: ${SPRING_DATASOURCE_USERNAME:leidy}
    password: ${SPRING_DATASOURCE_PASSWORD:leidy_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

app:
  security:
    public-endpoints:
      - /api/v1/health
      - /api/v1/auth/login
      - /api/v1/regioes
      - /api/v1/usuarios/clientes
      - /api/v1/usuarios/profissionais
      - /api/v1/usuarios/profissionais/pre-cadastro-completo
      - /api/v1/webhooks/**
    cors-allowed-origin-patterns:
      - ${APP_SECURITY_CORS_ALLOWED_ORIGIN_LOCALHOST:http://localhost:*}
      - ${APP_SECURITY_CORS_ALLOWED_ORIGIN_LOOPBACK:http://127.0.0.1:*}
      - ${APP_SECURITY_CORS_ALLOWED_ORIGIN_WSL:http://172.*.*.*:5173}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-with-at-least-32-characters}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  asaas:
    base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
    api-key: ${ASAAS_API_KEY:}
    webhook-token: ${ASAAS_WEBHOOK_TOKEN:}
    default-customer-id: ${ASAAS_DEFAULT_CUSTOMER_ID:}
    # POST /pagamentos/checkout now creates a standard Asaas /payments charge and
    # stores the returned payment.id in pagamentos.gateway_payment_id.
    payment-billing-type: ${ASAAS_PAYMENT_BILLING_TYPE:}
    payment-auto-redirect: ${ASAAS_PAYMENT_AUTO_REDIRECT:true}
    payment-callback-enabled: ${ASAAS_PAYMENT_CALLBACK_ENABLED:false}
    # Legacy compatibility fallback for older local env files; the first value is used
    # only when ASAAS_PAYMENT_BILLING_TYPE is not set.
    checkout-billing-types: ${ASAAS_CHECKOUT_BILLING_TYPES:CREDIT_CARD}
    # Optional for /payments. When empty or disabled, no callback.successUrl is sent to Asaas;
    # webhook confirmation remains the source of truth.
    checkout-success-url: ${ASAAS_CHECKOUT_SUCCESS_URL:}
    checkout-cancel-url: ${ASAAS_CHECKOUT_CANCEL_URL:http://localhost:5173/pagamento/cancelado}
    checkout-expired-url: ${ASAAS_CHECKOUT_EXPIRED_URL:http://localhost:5173/pagamento/expirado}
  pricing:
    hourly-rate: ${APP_PRICING_HOURLY_RATE:45.00}
    agency-commission-percent: ${APP_PRICING_AGENCY_COMMISSION_PERCENT:20.00}
  convites:
    expiracao:
      scheduler-enabled: ${APP_CONVITES_EXPIRACAO_SCHEDULER_ENABLED:true}
      fixed-delay-ms: ${APP_CONVITES_EXPIRACAO_FIXED_DELAY_MS:300000}
      initial-delay-ms: ${APP_CONVITES_EXPIRACAO_INITIAL_DELAY_MS:60000}
      batch-size: ${APP_CONVITES_EXPIRACAO_BATCH_SIZE:50}

logging:
  level:
    org.springframework.security: INFO
