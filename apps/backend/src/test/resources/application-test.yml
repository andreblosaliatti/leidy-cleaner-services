spring:
  datasource:
    url: jdbc:h2:mem:leidy_cleaner_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  security:
    public-endpoints:
      - /api/v1/health
      - /api/v1/auth/login
      - /api/v1/usuarios/clientes
      - /api/v1/usuarios/profissionais
      - /api/v1/webhooks/**
  asaas:
    webhook-token: test-webhook-token
